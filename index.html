<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fullscreen Popup</title>

<!-- iOS Home Screen Fullscreen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
}

/* Background */
.background{
    position: fixed;
    inset: 0;
    background: url("zurag.png") no-repeat center center;
    background-size: cover;
}

/* Invisible middle button - доод талд */
.middleBtn{
    position: absolute;
    top: 75%; /* доошлуулсан байрлал */
    left: 50%;
    transform: translate(-50%,-50%);
    width: 200px;
    height: 200px;
    background: transparent;
    z-index: 2;
}

/* Dark overlay */
.overlay{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
    z-index: 1;
}

.overlay.active{
    opacity: 1;
    pointer-events: all;
}

/* Fullscreen popup */
.popup{
    position: fixed;
    top: env(safe-area-inset-top);
    bottom: env(safe-area-inset-bottom);
    left: 0;
    right: 0;
    width: 100%;
    height: calc(100% - env(safe-area-inset-top) - env(safe-area-inset-bottom));
    object-fit: cover;
    transition: transform 0.3s ease;
    touch-action: none;
    z-index: 3;
}
</style>
</head>
<body>

<div class="background"></div>

<div class="middleBtn" onclick="openPopup()"></div>

<div class="overlay" id="overlay">
    <img src="pop.png" class="popup" id="popup">
</div>

<script>
const overlay = document.getElementById("overlay");
const popup = document.getElementById("popup");

let startY = 0;
let currentY = 0;
let dragging = false;

function openPopup(){
    overlay.classList.add("active");
    popup.style.transform = "translateY(0)";
}

// Drag popup
popup.addEventListener("touchstart", (e) => {
    startY = e.touches[0].clientY;
    dragging = true;
});

popup.addEventListener("touchmove", (e) => {
    if(!dragging) return;
    currentY = e.touches[0].clientY - startY;
    if(currentY > 0){ // зөвхөн доош
        popup.style.transform = `translateY(${currentY}px)`;
    }
});

popup.addEventListener("touchend", () => {
    dragging = false;
    if(currentY > 150){
        popup.style.transform = "translateY(100%)";
        setTimeout(() => {
            overlay.classList.remove("active");
            popup.style.transform = "translateY(0)";
        }, 300);
    } else {
        popup.style.transform = "translateY(0)";
    }
    currentY = 0;
});
</script>

</body>
</html>
