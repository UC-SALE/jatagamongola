<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fullscreen Popup</title>

<style>
html,body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
}

/* Background */
.background{
    position:fixed;
    inset:0;
    background:url("zurag.png") no-repeat center center;
    background-size:cover;
}

/* Invisible middle button */
.middleBtn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:200px;
    height:200px;
    background:transparent;
}

/* Dark overlay */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    opacity:0;
    pointer-events:none;
    transition:0.3s;
}

.overlay.active{
    opacity:1;
    pointer-events:all;
}

/* Fullscreen popup */
.popup{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    transition:transform 0.3s ease;
    touch-action:none;
}
</style>
</head>
<body>

<div class="background"></div>

<div class="middleBtn" onclick="openPopup()"></div>

<div class="overlay" id="overlay">
    <img src="pop.png" class="popup" id="popup">
</div>

<script>
const overlay = document.getElementById("overlay");
const popup = document.getElementById("popup");

let startY = 0;
let currentY = 0;
let dragging = false;

function openPopup(){
    overlay.classList.add("active");
    popup.style.transform = "translateY(0)";
}

popup.addEventListener("touchstart",(e)=>{
    startY = e.touches[0].clientY;
    dragging = true;
});

popup.addEventListener("touchmove",(e)=>{
    if(!dragging) return;
    currentY = e.touches[0].clientY - startY;

    if(currentY > 0){ // зөвхөн доош
        popup.style.transform = `translateY(${currentY}px)`;
    }
});

popup.addEventListener("touchend",()=>{
    dragging = false;

    if(currentY > 150){
        popup.style.transform = "translateY(100%)";
        setTimeout(()=>{
            overlay.classList.remove("active");
            popup.style.transform = "translateY(0)";
        },300);
    } else {
        popup.style.transform = "translateY(0)";
    }

    currentY = 0;
});
</script>
